name: yava
description: "اپلیکیشن خدماتی شهری برای شهر سبزوار - YAVA"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Networking
  dio: ^5.3.0
  retrofit: ^4.0.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^2.21.0
  firebase_auth: ^4.13.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  lottie: ^2.4.0

  # Localization & Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Navigation
  go_router: ^13.0.0

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.0.0
  geolocator: ^9.0.0
  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.0
  share_plus: ^7.2.0

  # Logging
  logger: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  retrofit_generator: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/localization/

  fonts:
    - family: IRANSans
      fonts:
        - asset: assets/fonts/IRANSans-Regular.ttf
        - asset: assets/fonts/IRANSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/IRANSans-Light.ttf
          weight: 300
